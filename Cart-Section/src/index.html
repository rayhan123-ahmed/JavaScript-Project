<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- google icon -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=shopping_cart"
    />
    <link href="./output.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Cart section</title>
  </head>
  <body class="h-[100vh] relative">
    <div class="absolute inset-0 bg-black/30"></div>
    <section>
      <div class="container backdrop-blur-md border border-white/30">
        <h1 class="text-2xl">Product</h1>
        <div id="product-list" class="mb-5">
          <!-- Products will dynamically add by javaScript -->
        </div>
        <h2 class="shp-cart mb-[15px] text-[25px]">Shopping Cart</h2>
        <div id="cart-items">
          <p id="empty-card">Your Card is empty</p>
        </div>
        <div id="cart-total" class="hidden text-right">
          <p>Total: <span id="total-price">$0.00</span></p>
          <button
            id="cheackout-btn"
            class="border-none p-5 text-white rounded-[5px] cursor-pointer transition-colors duration-300 bg-blue-500 hover:bg-blue-700"
          >
            Cheackout
          </button>
        </div>
      </div>
    </section>
    <script src="scirpt.js"></script>
  </body>
</html>
